<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>登录 · VPN 管理</title>
  <link rel="stylesheet" href="../admin/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">ZG</div>
    <h1>ZeroGate 管理后台</h1>
    <p class="muted">内网穿透 · VLESS · 多用户订阅</p>
    <form id="loginForm">
      <label class="field">
        <span>管理员密码</span>
        <input type="password" id="password" name="password" placeholder="ADMIN 环境变量" required autofocus>
      </label>
      <button type="submit" class="btn primary" id="loginBtn">登录</button>
      <p id="errorMsg" class="error hidden"></p>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = '登录中…';
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'password=' + encodeURIComponent(document.getElementById('password').value)
        });
        const ct = r.headers.get('content-type') || '';
        if (r.ok && ct.includes('json')) {
          const data = await r.json();
          if (data.success) { location.href = '/admin'; return; }
        }
        err.textContent = '密码错误，请重试';
        err.classList.remove('hidden');
      } catch {
        err.textContent = '网络错误';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
